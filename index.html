<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabor Fanta Sensi</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #ff7a00;
    }

    .tabs {
      display: flex;
      gap: 10px;
      padding: 0 15px 15px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid #333;
      text-align: center;
      cursor: pointer;
      color: #aaa;
    }

    .tab.active {
      background: #1a1a1a;
      border: 1px solid #ff7a00;
      color: #ff7a00;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #0d0d0d;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 18px;
      margin-bottom: 5px;
    }

    .card p {
      color: #888;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(90deg, #ff7a00, #ff9900);
      color: #000;
      transition: 0.2s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .fps-options {
      display: flex;
      gap: 10px;
    }

    .fps {
      flex: 1;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #333;
      text-align: center;
      cursor: pointer;
    }

    .fps.active {
      border: 1px solid #ff7a00;
      color: #ff7a00;
    }

    footer {
      text-align: center;
      color: #666;
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <header>SABOR FANTA SENSI</header>

  <div class="tabs">
    <div class="tab active">Performance</div>
    <div class="tab">Melhorar a Mira</div>
    <div class="tab">Gerar Sensi</div>
  </div>

  <div class="container">

    <!-- Melhorar Ping -->
    <div class="card">
      <h2>📶 Melhorar Ping</h2>
      <p>Reduza a latência da conexão</p>
      <button class="btn" onclick="ativarPing()">ATIVAR</button>
    </div>

    <!-- FPS -->
    <div class="card">
      <h2>🖥️ Aumentar FPS</h2>
      <p>Selecione a taxa de quadros</p>

      <div class="fps-options">
        <div class="fps" onclick="selectFPS(this,60)">60 FPS</div>
        <div class="fps" onclick="selectFPS(this,120)">120 FPS</div>
        <div class="fps" onclick="selectFPS(this,240)">240 FPS</div>
      </div>
    </div>

    <!-- Otimização -->
    <div class="card">
      <h2>🚀 Otimização do Jogo</h2>
      <p>Limpeza completa do sistema</p>
      <button class="btn" onclick="otimizar()">OTIMIZAR AGORA</button>
    </div>

    <footer>
      Aplicativo de simulação e personalização visual de configurações.
    </footer>

  </div>

  <script>
    function ativarPing() {
      alert("Ping otimizado com sucesso!");
    }

    function otimizar() {
      alert("Sistema otimizado!");
    }

    function selectFPS(el, fps) {
      document.querySelectorAll('.fps').forEach(f => f.classList.remove('active'));
      el.classList.add('active');
      alert("FPS selecionado: " + fps);
    }
  </script>

</body>
</html>
